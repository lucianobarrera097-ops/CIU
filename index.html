<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIU - Turnos | UNSTA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003087;
            --success: #10b981;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
       
        .container {
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 48, 135, 0.15);
            overflow: hidden;
        }
       
        header {
            background: linear-gradient(135deg, var(--primary), #0052cc);
            color: white;
            padding: 30px 20px 35px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
       
        .logo {
            width: 145px;
            height: auto;
            margin-bottom: 12px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border-radius: 8px;
        }
       
        .admin-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.25);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
        }
       
        .screen { padding: 40px 30px; opacity: 0; transform: translateY(30px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: none; }
        .screen.active { display: block !important; opacity: 1; transform: translateY(0); }
       
        h2 { text-align: center; margin-bottom: 30px; color: #1e2937; font-weight: 600; font-size: 1.5rem; }
        input { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 1.1rem; }
        .btn-primary { background: var(--primary); color: white; padding: 16px; border-radius: 14px; font-size: 1.1rem; width: 100%; margin-top: 10px; font-weight: 600; }
        .btn-secondary { background: #6b7280; color: white; padding: 16px; border-radius: 14px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <img
            src="logo-unsta.png"
            alt="Logo UNSTA"
            class="logo"
        >
        <h1 style="font-size: 2.3rem; margin-bottom: 8px;">CIU</h1>
        <p style="opacity: 0.95;">Universidad del Norte Santo Tomás de Aquino</p>
        
        <button class="admin-btn" onclick="mostrarLoginAdmin()" title="Administrador">⚙️</button>
    </header>

    <!-- PANTALLA 1 -->
    <div id="screen1" class="screen active">
        <h2>Ingrese sus datos</h2>
        <input type="text" id="dni" placeholder="DNI *" maxlength="8">
        <input type="tel" id="celular" placeholder="Celular *" maxlength="15">
        <button type="button" onclick="siguientePantalla()" class="btn-primary">Continuar →</button>
    </div>

    <!-- PANTALLA 2 -->
    <div id="screen2" class="screen">
        <h2>¿Cuál es el motivo de su consulta?</h2>
        <div class="motivos" id="motivosContainer"></div>
        <button type="button" onclick="registrarTurno()" id="btnRegistrar" disabled class="btn-primary">Obtener Turno</button>
        <button type="button" onclick="volverPantalla1()" class="btn-secondary">← Volver</button>
    </div>

    <!-- ÉXITO -->
    <div id="screenSuccess" class="screen">
        <div class="success-icon">✅</div>
        <h2 style="color: var(--success);">Turno Registrado</h2>
        <p style="color: #64748b;">Tu número de turno es:</p>
        <p id="numeroTurno" style="font-size: 3.2rem; font-weight: 700; color: var(--primary);"></p>
        <button type="button" onclick="reiniciarFormulario()" class="btn-primary" style="margin-top: 35px;">Nuevo Registro</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // === Tu JavaScript completo (con animaciones) ===
    let datosUsuario = {};
    const motivosLista = ["Inscripciones", "Cursos", "Alumnos", "Becas", "Otros trámites"];
    let contadores = {};
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuZW4epiGmW82rrVmAkDHLdqJ-1NzQq11DVdsk-JypimBliP5he6rrSZf5qW4fYIru0g/exec";

    function showToast(message, duration = 2500) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, duration);
    }

    function cargarMotivos() {
        const container = document.getElementById('motivosContainer');
        container.innerHTML = '';
        motivosLista.forEach((motivo, index) => {
            const btn = document.createElement('button');
            btn.className = 'motivo-btn';
            btn.textContent = motivo;
            btn.onclick = () => seleccionarMotivo(btn, motivo);
            container.appendChild(btn);
        });
    }

    function seleccionarMotivo(btn, motivo) {
        document.querySelectorAll('.motivo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        datosUsuario.motivo = motivo;
        document.getElementById('btnRegistrar').disabled = false;
    }

    function generarNumeroTurno(motivo) {
        const inicial = motivo.charAt(0).toUpperCase();
        if (!contadores[inicial]) contadores[inicial] = 0;
        contadores[inicial]++;
        return `${inicial}-${String(contadores[inicial]).padStart(3, '0')}`;
    }

    function siguientePantalla() {
        const dni = document.getElementById('dni').value.trim();
        const celular = document.getElementById('celular').value.trim();
        if (!dni || dni.length < 7) return showToast("❌ Ingresa un DNI válido");
        if (!celular || celular.length < 8) return showToast("❌ Ingresa un celular válido");

        datosUsuario = { dni, celular };
        document.getElementById('screen1').classList.remove('active');
        setTimeout(() => document.getElementById('screen2').classList.add('active'), 100);
    }

    async function registrarTurno() {
        const btn = document.getElementById('btnRegistrar');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const numeroTurno = generarNumeroTurno(datosUsuario.motivo);
        const data = {
            Numero_Turno: numeroTurno,
            Fecha: new Date().toLocaleString('es-AR'),
            DNI: datosUsuario.dni,
            Celular: datosUsuario.celular,
            Motivo: datosUsuario.motivo
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(data)
            });
            const resultado = await response.json();
            if (resultado.success) {
                document.getElementById('numeroTurno').textContent = numeroTurno;
                document.getElementById('screen2').classList.remove('active');
                document.getElementById('screenSuccess').classList.add('active');
            }
        } catch (e) {
            showToast("❌ Error al registrar");
        } finally {
            btn.disabled = false;
            btn.innerText = "Obtener Turno";
        }
    }

    function mostrarLoginAdmin() { window.open("https://docs.google.com/spreadsheets/d/1CGsivhXMu9JAwl4aR0MlYMnnlH20xEaBQK_ZyQHrt0A/edit", "_blank"); }

    function reiniciarFormulario() {
        document.getElementById('screenSuccess').classList.remove('active');
        document.getElementById('screen1').classList.add('active');
        document.getElementById('dni').value = '';
        document.getElementById('celular').value = '';
        document.querySelectorAll('.motivo-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btnRegistrar').disabled = true;
    }

    function volverPantalla1() {
        document.getElementById('screen2').classList.remove('active');
        setTimeout(() => document.getElementById('screen1').classList.add('active'), 200);
    }

    window.onload = cargarMotivos;
</script>
</body>
</html>
